<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background for PWA Icon -->
  <rect width="100%" height="100%" fill="black" />
  
  <g fill="white" transform="translate(200, 200)">
    <!-- Mortar Bowl Body -->
    <path d="M -120 -40 Q -120 70 0 70 Q 120 70 120 -40 L -120 -40 Z" />
    
    <!-- Mortar Base -->
    <path d="M -50 70 L 50 70 Q 60 85 0 85 Q -60 85 -50 70 Z" />
    
    <!-- Pestle (The grinding tool) -->
    <g transform="rotate(-35)">
        <rect x="-15" y="-140" width="35" height="110" rx="17" />
    </g>
    
    <!-- "MELP" Text using a clean, monospace-style font -->
    <text x="0" y="25" font-family="Courier New, monospace" font-weight="900" font-size="45" text-anchor="middle" fill="black">MELP</text>
  </g>
</svg>